name: Azure Static Web Apps CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop

env:
  DOTNET_CORE_VERSION: 8.0.x
  APP_LOCATION: src/Apps/Witness/NTS.Witness.Web
  API_LOCATION: src/Apps/Nexus/NTS.Nexus.HTTP
  OUTPUT_LOCATION: wwwroot
  SWA_NAME: lively-rock-07e20cd03
  SWA_RESOURCE_GROUP: NTS

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Witness - Build & Deploy to a temporary Staging evnironment
    env:
      AZURE_SUBSCRIPTION_DEV_CREDENTIALS: ${{ secrets.AZURE_SUBSCRIPTION_DEV_CREDENTIALS }}
      MONGO_CONNECTION_STRING: ${{ secrets.MONGO_CONNECTION_STRING }}
      AZURE_NTSSTORAGEDEV_CONNECTION_STRING: ${{ secrets.AZURE_NTSSTORAGEDEV_CONNECTION_STRING }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
        
      # Slap on top of every build: see https://github.com/Not-Endurance/not-timing-system/issues/361
      - name: Remove local-cache NuGet source
        run: dotnet nuget remove source "local-cache" --configfile ./src/NuGet.config

      - name: Login to Azure
        if: ${{ env.AZURE_SUBSCRIPTION_DEV_CREDENTIALS != '' && env.MONGO_CONNECTION_STRING != '' }}
        uses: azure/login@v1
        with:
          creds: ${{ env.AZURE_SUBSCRIPTION_DEV_CREDENTIALS }}

      - name: Configure SWA managed API settings
        if: ${{ env.AZURE_SUBSCRIPTION_DEV_CREDENTIALS != '' && env.MONGO_CONNECTION_STRING != '' }}
        shell: bash
        run: |
          settings=()
          settings+=("MONGO_CONNECTION_STRING=${MONGO_CONNECTION_STRING}")
          settings+=("FUNCTIONS_WORKER_RUNTIME=dotnet-isolated")

          if [ -n "${AZURE_NTSSTORAGEDEV_CONNECTION_STRING}" ]; then
            settings+=("AzureWebJobsStorage=${AZURE_NTSSTORAGEDEV_CONNECTION_STRING}")
          fi

          az staticwebapp appsettings set \
            --name "${{ env.SWA_NAME }}" \
            --resource-group "${{ env.SWA_RESOURCE_GROUP }}" \
            --setting-names "${settings[@]}" \
            --output none

      - name: Validate managed API configuration
        if: ${{ env.MONGO_CONNECTION_STRING == '' }}
        shell: bash
        run: |
          echo "::warning::Secret 'MONGO_CONNECTION_STRING' is not set. Ensure the Static Web App has an app setting named MONGO_CONNECTION_STRING, otherwise managed Functions deployment will fail."
      
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "upload"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_ROCK_07E20CD03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}

  deploy-staging:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Witness - Deploy to Staging
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_ROCK_07E20CD03 }}
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}

