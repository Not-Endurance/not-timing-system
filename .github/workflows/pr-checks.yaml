name: "[net8] PR Checks"
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

env:
  DOTNET_CORE_VERSION: 8.0.x
  SOURCE_DIR: src
  NEXUS_PATH: Apps/Nexus/NTS.Nexus.HTTP
  JUDGE_PATH: Apps/Judge/NTS.Judge
  CONFIGURATION: Release
  SOLUTION: not-timing-system.sln
  BUILD_SOLUTION: not-timing-system.no-maui.sln
  MAUI_PROJECT_KEYWORD: MAUI

jobs:
  pr-checks-csharpier:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Print pull_request event
        run: |
          echo Branch:
          echo "${{ github.event.pull_request }}"

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          # Use custom PAT instead of GITHUB_TOKEN in order to allow subsequent workflow execution 
          # based on this csharpier commit. Otherwise the PR is stuc (csharpier commit is never checked):
          # https://stackoverflow.com/questions/74047352/github-checks-reset-their-statuses-after-push-made-by-a-workflow-run
          token: ${{ secrets.NTS_CICD_PAT }}  
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}  #

      - name: Install Csharpier
        run: dotnet tool install -g csharpier --version 0.30.6

      - name: Format code
        run: dotnet csharpier .

      - name: Check for formatting changes
        run: |
          if [[ `git status --porcelain` ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            if [[ `git status --porcelain` ]]; then
              git commit -m "Apply Csharpier code formatting"
              git push
            else 
              echo "No formatting changes needed"
            fi
          else
            echo "No formatting changes needed"
          fi

  pr-checks-build:
    runs-on: ubuntu-latest
    needs: pr-checks-csharpier
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
        
    # Slap on top of every build: see https://github.com/Not-Endurance/not-timing-system/issues/361
    - name: Remove local-cache NuGet source
      run: dotnet nuget remove source "local-cache" --configfile ./${{ env.SOURCE_DIR }}/NuGet.config

    - name: Create solution without MAUI projects
      shell: bash
      run: |
        set -euo pipefail

        SLN=${{ env.SOLUTION }}
        OUT=${{ env.BUILD_SOLUTION }}

        awk '
          BEGIN { skip=0 }
          /^Project\(/ && $0 ~ /"[^"]*${{ env.MAUI_PROJECT_KEYWORD }}[^"]*"/ { skip=1; next }
          /^EndProject/ && skip==1 { skip=0; next }
          skip==0 { print }
        ' "$SLN" > "$OUT"

        echo "Created filtered solution: $OUT"

    - name: Restore
      run: dotnet restore ${{ env.BUILD_SOLUTION }}

    - name: Build
      run: dotnet build ${{ env.BUILD_SOLUTION }} -c ${{ env.CONFIGURATION }} --no-restore

    - name: Publish filtered solution for debugging
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILD_SOLUTION }}
        path: /
        include-hidden-files: true
