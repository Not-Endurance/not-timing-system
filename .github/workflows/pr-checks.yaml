name: "[net8] PR Checks"
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

env:
  DOTNET_CORE_VERSION: 8.0.x
  SOURCE_DIR: src
  NEXUS_PATH: Nexus/NTS.Nexus.HTTP
  JUDGE_PATH: Judge/NTS.Judge
  CONFIGURATION: Release

jobs:
  pr-checks-csharpier:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Print pull_request event
        run: |
          echo Branch:
          echo "${{ github.event.pull_request }}"

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          # Use custom PAT instead of GITHUB_TOKEN in order to allow subsequent workflow execution 
          # based on this csharpier commit. Otherwise the PR is stuc (csharpier commit is never checked):
          # https://stackoverflow.com/questions/74047352/github-checks-reset-their-statuses-after-push-made-by-a-workflow-run
          token: ${{ secrets.NTS_CICD_PAT }}  
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}  #

      - name: Install Csharpier
        run: dotnet tool install -g csharpier --version 0.30.6

      - name: Format code
        run: csharpier format .

      - name: Check for formatting changes
        run: |
          if [[ `git status --porcelain` ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            if [[ `git status --porcelain` ]]; then
              git commit -m "Apply Csharpier code formatting"
              git push
            else 
              echo "No formatting changes needed"
            fi
          else
            echo "No formatting changes needed"
          fi

  pr-checks-build:
    runs-on: ubuntu-latest
    needs: pr-checks-csharpier
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
        
    #Slap on top of every build: see https://github.com/Not-Endurance/not-timing-system/issues/361
    - name: Set current workding directory env
      run: echo "CURRENT_DIR=$(pwd)/src" >> $GITHUB_ENV
    - name: Remove local-cache NuGet source
      run: dotnet nuget remove source "local-cache" --configfile ./${{ env.SOURCE_DIR }}/NuGet.config

    - name: Restore Nexus
      run: dotnet restore ${{ env.SOURCE_DIR }}/${{ env.NEXUS_PATH }}
    
    - name: Build Nexus
      run: |
        dotnet build ${{ env.SOURCE_DIR }}/${{ env.NEXUS_PATH }} \
        --configuration ${{ env.CONFIGURATION }} \
        --no-restore \
        -property:SolutionDir="$CURRENT_DIR"

    - name: Restore Judge
      run: dotnet restore ${{ env.SOURCE_DIR }}/${{ env.JUDGE_PATH }}
    
    - name: Build Judge
      run: |
        dotnet build ${{ env.SOURCE_DIR }}/${{ env.JUDGE_PATH }} \
        --configuration ${{ env.CONFIGURATION }} \
        --no-restore \
        -property:SolutionDir="$CURRENT_DIR"
