name: CR
run-name: CR [${{ github.ref_name }}]

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

env:
  DOTNET_CORE_VERSION: 8.0.x
  SOURCE_DIR: src
  CONFIGURATION: Release
  SOLUTION_FILE: not-timing-system.sln
  BUILD_SOLUTION_FILE: not-timing-system.no-maui.sln
  NOT_MAUI_PROJECT_GUID: FF64199D-F13D-7446-D3B1-B571B254BEDB
  JUDGE_MAUI_PROJECT_GUID: 83AF25AC-E8A1-7177-6B05-518A4717C909

jobs:
  pr-checks-csharpier:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    name: Csharpier format
    steps:
      - name: Print pull_request event
        run: |
          echo Branch:
          echo "${{ github.event.pull_request }}"

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          # Use custom PAT instead of GITHUB_TOKEN in order to allow subsequent workflow execution 
          # based on this csharpier commit. Otherwise the PR is stuc (csharpier commit is never checked):
          # https://stackoverflow.com/questions/74047352/github-checks-reset-their-statuses-after-push-made-by-a-workflow-run
          token: ${{ secrets.NTS_CICD_PAT }}  
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_CORE_VERSION }}  #

      - name: Install Csharpier
        run: dotnet tool install -g csharpier --version 0.30.6

      - name: Format code
        run: dotnet csharpier .

      - name: Check for formatting changes
        run: |
          if [[ `git status --porcelain` ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            if [[ `git status --porcelain` ]]; then
              git commit -m "Apply Csharpier code formatting"
              git push
            else 
              echo "No formatting changes needed"
            fi
          else
            echo "No formatting changes needed"
          fi

  pr-checks-build:
    runs-on: ubuntu-latest
    needs: pr-checks-csharpier
    name: Dotnet build
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
   
    # Remove when dropping MAUI
    - name: Create solution without MAUI projects
      shell: bash
      run: |
        set -euo pipefail

        SLN="${{ env.SOURCE_DIR }}/${{ env.SOLUTION_FILE }}"
        OUT="${{ env.SOURCE_DIR }}/${{ env.BUILD_SOLUTION_FILE }}"

        # MAUI Project GUIDs
        GUIDS=(
          "${{ env.NOT_MAUI_PROJECT_GUID }}"
          "${{ env.JUDGE_MAUI_PROJECT_GUID }}"
        )

        # Build a single regex alternation like: \{GUID1\}|\{GUID2\}
        PATTERN="$(printf '%s\n' "${GUIDS[@]}" \
          | sed -e 's/[{}]/\\&/g' \
          | paste -sd'|' -)"

        # Pass 1: remove Project blocks whose header contains one of the GUIDs
        awk -v pat="$PATTERN" '
          BEGIN { IGNORECASE=1; skip=0 }
          /^Project\(/ {
            if ($0 ~ pat) { skip=1; next }
          }
          skip==1 {
            if (/^EndProject$/) { skip=0 }
            next
          }
          { print }
        ' "$SLN" > "$OUT.tmp"

        # Pass 2: drop any remaining line that contains any of the GUIDs
        # (cleans NestedProjects, ProjectConfigurationPlatforms, etc.)
        grep -Eiv "$PATTERN" "$OUT.tmp" > "$OUT"
        rm -f "$OUT.tmp"

        echo "Created filtered solution: $OUT"

    - name: Publish filtered solution for debugging
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILD_SOLUTION_FILE }}
        path: ${{ env.SOURCE_DIR}}/${{ env.BUILD_SOLUTION_FILE }}
        include-hidden-files: true

    - name: Restore
      run: dotnet restore ${{ env.SOURCE_DIR }}/${{ env.BUILD_SOLUTION_FILE }}

    - name: Build
      run: dotnet build ${{ env.SOURCE_DIR }}/${{ env.BUILD_SOLUTION_FILE }} -c ${{ env.CONFIGURATION }} --no-restore
