<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>NTS Witness</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="_content/Not.Blazor/application-shell.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="NTS.Witness.Web.styles.css" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>
<body>
    <img class="n-application-backdrop" src="appicon.svg" alt="" aria-hidden="true" />
    <div id="app">
        <div class="loading-shell" role="status" aria-live="polite" aria-label="Loading application">
            <div class="loading-shell__body">
                <div class="loading-shell__spinner" aria-hidden="true"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        const queryEnvironment = new URLSearchParams(window.location.search).get("environment");
        const supportedEnvironments = ["Development", "Staging", "Production"];
        const environment = supportedEnvironments.includes(queryEnvironment) ? queryEnvironment : null;
        Blazor.start(environment ? { environment: environment } : {});
    </script>
</body>
</html>
